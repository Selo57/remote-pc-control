name: Verify

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - run: npm ci
      - run: npm run verify
